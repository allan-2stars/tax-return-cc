services:
  frontend:
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  backend:
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/db/tax_return_dev.db
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend:/app
      - tax_dev_data:/data
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

volumes:
  tax_dev_data:
