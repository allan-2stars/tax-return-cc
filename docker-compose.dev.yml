services:
  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  backend:
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/db/tax_return_dev.db
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3060,http://127.0.0.1:3060
    volumes:
      - ./backend:/app
      - tax_dev_data:/data
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

volumes:
  tax_dev_data:
